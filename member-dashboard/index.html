<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Berry - Member Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/header.js"></script>
    <script src="/footer.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .member-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .dashboard-header {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
        }

        .dashboard-header h1 {
            margin: 0;
            color: var(--primary-dark);
            flex: 1;
        }

        .logout-btn {
            padding: 0.6rem 1.2rem;
            background: #d32f2f;
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #b71c1c;
            transform: translateY(-1px);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
            width: 100%;
        }

        .card h2 {
            margin-top: 0;
            color: #000;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            width: 100%;
        }

        .save-btn {
            padding: 0.9rem 2rem;
            background: #FF2400;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid var(--success);
        }

        .saved-posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: var(--light-gray);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .post-card h3 {
            margin-top: 0;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .post-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .remove-post-btn {
            padding: 0.5rem 1rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .remove-post-btn:hover {
            background: #d32f2f;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-item {
            background: var(--light-gray);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .message-item h4 {
            margin: 0 0 0.5rem 0;
            color: var(--primary-dark);
        }

        .message-item .meta {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .message-item p {
            margin: 0;
            color: var(--text);
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .compose-message {
            margin-bottom: 2rem;
        }

        /* Blog Card Styles - EXACT match from /blog page */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
            width: 100%;
        }

        .blog-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .blog-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 2rem;
            color: var(--white);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .blog-card h3 {
            font-size: 1.4rem;
            margin: 0;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            color: white;
        }

        .blog-card-body {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .blog-category {
            display: inline-block;
            background: rgba(255, 36, 0, 0.1);
            color: var(--accent);
            padding: 0.35rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .blog-excerpt {
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.8;
            flex-grow: 1;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .read-more {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .read-more:hover {
            color: var(--accent-light);
        }

        .save-blog-btn {
            background: var(--accent);
            color: var(--white);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-blog-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .save-blog-btn.saved {
            background: #4CAF50;
        }

        .blog-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .saved-posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        /* Modal Styling - match /blog page */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="member-container">
        <div class="dashboard-header">
            <h1>Member Dashboard</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
                <a href="/member-login/" class="logout-btn" style="background: var(--secondary); text-decoration: none; display: flex; align-items: center;">← Back to Login</a>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('profile')">👤 Profile</button>
            <button class="tab-btn" onclick="switchTab('saved')">💾 Saved Content</button>
            <button class="tab-btn" onclick="switchTab('inbox')">📧 Inbox</button>
        </div>

        <!-- Profile Tab -->
        <div id="profile" class="tab-content active">
            <div class="card">
                <h2>My Profile</h2>
                <div class="message" id="profileMessage"></div>
                <form id="profileForm" onsubmit="handleProfileUpdate(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" disabled style="background: var(--light-gray); cursor: not-allowed;">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone">
                        </div>
                    </div>
                    <button type="submit" class="save-btn">Update Profile</button>
                </form>
            </div>

            <!-- Change Password Section -->
            <div class="card">
                <h2>Change Password</h2>
                <div class="message" id="passwordMessage"></div>
                <form id="passwordForm" onsubmit="handleChangePassword(event)">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter your current password" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                        </div>
                    </div>
                    <button type="submit" class="save-btn">Change Password</button>
                </form>
            </div>

            <!-- Player Profile Section -->
            <div class="card" id="playerProfileSection" style="display: none;">
                <h2>My Player Profile</h2>
                <div class="message" id="playerProfileMessage"></div>
                <form id="playerProfileForm" onsubmit="handlePlayerProfileUpdate(event)">
                    <div class="form-group">
                        <label>Positions</label>
                        <div style="display: flex; gap: 2rem; margin-bottom: 1rem;">
                            <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal;">
                                <input type="checkbox" id="posForward" onchange="updatePlayerPositions()"> Forward
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal;">
                                <input type="checkbox" id="posDefense" onchange="updatePlayerPositions()"> Defense
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal;">
                                <input type="checkbox" id="posGoalie" onchange="updatePlayerPositions()"> Goalie
                            </label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="playerYearsExp">Years of Playing Experience</label>
                            <input type="number" id="playerYearsExp" min="0" max="100" placeholder="e.g., 5">
                        </div>
                        <div class="form-group">
                            <label for="playerBirthYearProfile">Birth Year</label>
                            <input type="number" id="playerBirthYearProfile" min="1980" max="2030" placeholder="e.g., 2008">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Current Teams</label>
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 1rem;">
                            <thead>
                                <tr style="background: var(--secondary); color: white;">
                                    <th style="padding: 0.75rem; text-align: left; border: 1px solid var(--border);">Organization</th>
                                    <th style="padding: 0.75rem; text-align: left; border: 1px solid var(--border);">Age & Level (e.g., 12UAA)</th>
                                    <th style="padding: 0.75rem; text-align: center; border: 1px solid var(--border); width: 80px;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="playerTeamsTable">
                            </tbody>
                        </table>
                        <button type="button" onclick="addPlayerTeamRow()" style="background: var(--secondary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 600;">+ Add Team</button>
                    </div>

                    <button type="submit" class="save-btn">Update Player Profile</button>
                </form>
            </div>

            <!-- Coach Profile Section -->
            <div class="card" id="coachProfileSection" style="display: none;">
                <h2>My Coach Profile</h2>
                <div class="message" id="coachProfileMessage"></div>
                <form id="coachProfileForm" onsubmit="handleCoachProfileUpdate(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="coachYearsExp">Years of Coaching Experience</label>
                            <input type="number" id="coachYearsExp" min="0" max="100" placeholder="e.g., 10">
                        </div>
                        <div class="form-group">
                            <label for="coachUSAHockeyLevel">USA Hockey Certification Level</label>
                            <input type="number" id="coachUSAHockeyLevel" min="1" max="5" placeholder="e.g., 3">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Coaching Teams</label>
                        <div id="coachTeamsList" style="margin-bottom: 1rem;"></div>
                        <button type="button" onclick="addCoachTeamField()" style="background: var(--secondary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 600;">+ Add Team</button>
                    </div>

                    <button type="submit" class="save-btn">Update Coach Profile</button>
                </form>
            </div>

            <!-- Parents: My Players Section -->
            <div class="card" id="playersSection" style="display: none;">
                <h2>My Players</h2>
                <div id="playersList" style="margin-top: 2rem;"></div>
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                    <h3>Add Player</h3>
                    <form id="addPlayerForm" onsubmit="handleAddPlayer(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="playerName">Child's Name</label>
                                <input type="text" id="playerName" required>
                            </div>
                            <div class="form-group">
                                <label for="playerBirthYear">Birth Year</label>
                                <input type="number" id="playerBirthYear" min="1990" max="2030" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="playerTeam">Current Team</label>
                            <input type="text" id="playerTeam" placeholder="e.g., Local Juniors">
                        </div>
                        <button type="submit" class="save-btn">Add Player</button>
                    </form>
                </div>
            </div>

            <!-- Coach/Parent: Teams Section -->
            <div class="card" id="teamsSection" style="display: none;">
                <h2>Team Organizations</h2>
                <div id="teamsList" style="margin-top: 2rem;"></div>
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                    <h3>Add Team</h3>
                    <form id="addTeamForm" onsubmit="handleAddTeam(event)">
                        <div class="form-group">
                            <label for="teamName">Team Name</label>
                            <input type="text" id="teamName" placeholder="e.g., Local Hockey League" required>
                        </div>
                        <button type="submit" class="save-btn">Add Team</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Saved Content Tab -->
        <div id="saved" class="tab-content">
            <div class="card">
                <h2>Saved Blog Posts</h2>
                <div id="savedPostsList" class="saved-posts-grid"></div>
            </div>
        </div>

        <!-- Inbox Tab -->
        <div id="inbox" class="tab-content">
            <div class="card compose-message">
                <h2>Send Message to Coach</h2>
                <div class="message" id="messageMessage"></div>
                <form id="messageForm" onsubmit="handleSendMessage(event)">
                    <div class="form-group">
                        <label for="messageSubject">Subject</label>
                        <input type="text" id="messageSubject" placeholder="e.g., Question about drills" required>
                    </div>
                    <div class="form-group">
                        <label for="messageContent">Message</label>
                        <textarea id="messageContent" placeholder="Type your message..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="save-btn">Send Message</button>
                </form>
            </div>

            <div class="card">
                <h2>📧 Your Messages with Coach</h2>
                <div id="inboxList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </div>

        <!-- Message Thread Modal -->
        <div id="threadModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); align-items: center; justify-content: center;">
            <div style="background: var(--white); padding: 2rem; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative;">
                <button onclick="closeThreadModal()" style="position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; background: none; border: none; color: var(--text-light);">×</button>
                
                <h2 id="threadSubject" style="margin-top: 0; color: var(--primary-dark);"></h2>
                <div id="threadMessages" style="margin: 2rem 0; max-height: 400px; overflow-y: auto;"></div>
                
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                    <label style="display: block; font-weight: 600; margin-bottom: 1rem;">Reply to Coach</label>
                    <textarea id="threadReplyContent" placeholder="Type your reply..." rows="4" style="width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1rem; resize: vertical; box-sizing: border-box;"></textarea>
                    <button onclick="sendThreadReply()" style="background: var(--accent); color: white; border: none; padding: 0.8rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem;">Send Reply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Module script for Firebase logic -->
    <script type="module" src="/member-dashboard/script.js"></script>

    <!-- Non-module script for onclick handlers -->
    <script src="/member-dashboard/handlers.js"></script>
</body>
</html>
