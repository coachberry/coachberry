<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Berry - Member Login</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/header.js"></script>
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 2rem;
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-box img {
            max-width: 100%;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .login-box .subtitle {
            text-align: center;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 36, 0, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-light);
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .forgot-password-link {
            text-align: right;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .forgot-password-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-light);
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal h2 {
            margin-bottom: 1rem;
            color: var(--primary-dark);
            font-size: 1.5rem;
        }

        .modal p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #4CAF50;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box" id="loginBox">
            <img src="https://coachberry.github.io/coachberry/CoachBerryLOGO-transparent-lightbg.png" alt="Coach Berry Logo">
            <div class="subtitle">Member Dashboard</div>
            <div class="error-message" id="loginError"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="forgot-password-link">
                    <a href="#" onclick="openForgotPasswordModal(event)">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>
            <div class="signup-link">
                Don't have an account? <a href="/#membership">Sign up here</a>
            </div>
        </div>
        <div style="display: none;" id="checkingAuth">
            <div style="text-align: center; color: white;">
                <p>Checking authentication...</p>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeForgotPasswordModal()">&times;</button>
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class="success-message" id="forgotPasswordSuccess"></div>
            <div class="error-message" id="forgotPasswordError"></div>
            <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="login-btn" id="resetBtn">Send Reset Link</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtLNJJoVBqWdKjDxfddEkdBYAWGrnpuhw",
            authDomain: "coach-berry.firebaseapp.com",
            projectId: "coach-berry",
            storageBucket: "coach-berry.firebasestorage.app",
            messagingSenderId: "170282824286",
            appId: "1:170282824286:web:5387ec9826c38466c07acf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Hide login form while checking auth
        const loginBox = document.getElementById('loginBox');
        const checkingAuth = document.getElementById('checkingAuth');

        // Check if already logged in BEFORE showing form
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in - redirect immediately
                window.location.href = '/member-dashboard/';
            } else {
                // User not logged in - show login form
                loginBox.style.display = 'block';
                checkingAuth.style.display = 'none';
            }
        });

        window.handleLogin = async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing In...';
            errorDiv.classList.remove('show');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = '/member-dashboard/';
            } catch (error) {
                let errorMessage = 'Invalid email or password';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Email not found';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        };

        window.handleForgotPassword = async function(event) {
            event.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const resetBtn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('forgotPasswordError');
            const successDiv = document.getElementById('forgotPasswordSuccess');

            resetBtn.disabled = true;
            resetBtn.innerHTML = 'Sending...';
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            try {
                await sendPasswordResetEmail(auth, email);
                successDiv.textContent = '✓ Password reset link sent! Check your email for instructions.';
                successDiv.classList.add('show');
                document.getElementById('forgotPasswordForm').reset();
                
                // Close modal after 3 seconds
                setTimeout(() => {
                    closeForgotPasswordModal();
                }, 3000);
            } catch (error) {
                let errorMessage = 'Error sending reset link';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Email not found. Please check and try again.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address';
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.classList.add('show');
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Send Reset Link';
            }
        };
    </script>

    <script>
        // Non-module functions for modal
        function openForgotPasswordModal(event) {
            event.preventDefault();
            document.getElementById('forgotPasswordModal').classList.add('active');
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('active');
            document.getElementById('forgotPasswordError').classList.remove('show');
            document.getElementById('forgotPasswordSuccess').classList.remove('show');
            document.getElementById('forgotPasswordForm').reset();
        }

        // Close modal when clicking outside
        document.addEventListener('click', function(event) {
            const modal = document.getElementById('forgotPasswordModal');
            if (event.target === modal) {
                closeForgotPasswordModal();
            }
        });
    </script>
</body>
</html>
