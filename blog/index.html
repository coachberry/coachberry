<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Berry - Blog | Hockey Tips, Drills & Strategies</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/header.js"></script>
    <script src="/footer.js"></script>
    <style>
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: var(--white);
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255, 36, 0, 0.08);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(40px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Main Content */
        .main-section {
            padding: 4rem 2rem;
            background: var(--white);
        }

        /* Controls Section */
        .controls-section {
            margin-bottom: 2rem;
        }

        .blog-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--border);
            background: var(--white);
            color: var(--text);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
        }

        /* Search Section */
        .search-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 0.9rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 36, 0, 0.1);
        }

        .search-btn {
            padding: 0.9rem 1.5rem;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .clear-search-btn {
            padding: 0.9rem 1.5rem;
            background: var(--text-light);
            color: var(--white);
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }

        .clear-search-btn.show {
            display: inline-block;
        }

        .clear-search-btn:hover {
            background: var(--text);
        }

        .search-results-info {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: none;
        }

        .search-results-info.show {
            display: block;
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .blog-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .blog-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 2rem;
            color: var(--white);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .blog-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .blog-card-body {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .blog-category-tag {
            display: inline-block;
            background: rgba(255, 36, 0, 0.1);
            color: var(--accent);
            padding: 0.35rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .blog-excerpt {
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.8;
            flex-grow: 1;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .read-more {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .read-more:hover {
            color: var(--accent-light);
        }

        .save-blog-btn {
            background: var(--accent);
            color: var(--white);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-blog-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .save-blog-btn.saved {
            background: #4CAF50;
        }

        .blog-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        /* Post Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
            background: none;
            border: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
            font-size: 2rem;
        }

        .modal-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .modal-category-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--white);
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-date {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .modal-content p {
            margin-bottom: 1.5rem;
            line-height: 1.9;
            color: var(--text);
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--light-gray);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state h3 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 1.5rem;
                max-width: 100%;
            }

            .modal h2 {
                font-size: 1.5rem;
            }

            .search-section {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
            }

            .search-btn, .clear-search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header loaded from header.js -->

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hockey Knowledge Hub</h1>
            <p>Expert tips, strategies, drills, and insights from Coach Matt Berry. Learn from 30+ years of hockey experience.</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="main-section">
        <div class="container">
            <!-- Controls Section -->
            <div class="controls-section">
                <!-- Category Filters -->
                <div class="blog-filters" id="filterButtons">
                    <button class="filter-btn active" onclick="filterBlog('all')">All Posts</button>
                </div>

                <!-- Search Section -->
                <div class="search-section">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search by keywords (e.g., goalie pads, skate sharpening...)" onkeypress="handleSearchKeypress(event)">
                    <button class="search-btn" onclick="handleSearch()">Search</button>
                    <button class="clear-search-btn" id="clearSearchBtn" onclick="clearSearch()">Clear Search</button>
                </div>

                <!-- Search Results Info -->
                <div class="search-results-info" id="searchResultsInfo"></div>
            </div>

            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div class="loading-spinner"></div>
                <p>Loading blog posts...</p>
            </div>

            <!-- Blog Grid -->
            <div class="blog-grid" id="blogGrid" style="display: none;"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <h3>No blog posts yet</h3>
                <p>Check back soon for hockey tips, strategies, and coaching insights!</p>
            </div>
        </div>
    </section>

    <!-- Post Modal -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePost()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta">
                <div id="modalCategories"></div>
                <div class="modal-date" id="modalDate"></div>
            </div>
            <div id="modalBody"></div>
            <div class="blog-actions" id="modalActions" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <button class="save-blog-btn" onclick="saveBlogModal()" id="save-modal-btn">💾 Save Blog Post</button>
            </div>
        </div>
    </div>

    <!-- Footer loaded from footer.js -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, getDoc, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtLNJJoVBqWdKjDxfddEkdBYAWGrnpuhw",
            authDomain: "coach-berry.firebaseapp.com",
            projectId: "coach-berry",
            storageBucket: "coach-berry.firebasestorage.app",
            messagingSenderId: "170282824286",
            appId: "1:170282824286:web:5387ec9826c38466c07acf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allPosts = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // Normalize category (capitalize first letter, lowercase rest)
        function normalizeCategory(category) {
            if (!category || typeof category !== 'string') return '';
            return category.charAt(0).toUpperCase() + category.slice(1).toLowerCase();
        }

        // Get all categories from a post (handles both formats)
        function getAllCategories(post) {
            if (Array.isArray(post.categories)) {
                return post.categories;
            } else if (post.category) {
                return [post.category];
            }
            return [];
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load blog posts from Firebase
        async function loadBlogPosts() {
            try {
                const postsQuery = query(collection(db, 'blogPosts'), orderBy('datePublished', 'desc'));
                const snapshot = await getDocs(postsQuery);
                
                allPosts = [];
                const categoriesSet = new Set();
                
                snapshot.forEach(doc => {
                    allPosts.push({
                        id: doc.id,
                        ...doc.data()
                    });

                    // Collect unique categories
                    getAllCategories(doc.data()).forEach(cat => {
                        categoriesSet.add(normalizeCategory(cat));
                    });
                });

                // Generate filter buttons
                generateFilterButtons(Array.from(categoriesSet).sort());
                
                // Display posts
                displayPosts();
            } catch (error) {
                console.error('Error loading blog posts:', error);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        // Generate filter buttons
        function generateFilterButtons(categories) {
            const filterContainer = document.getElementById('filterButtons');
            filterContainer.innerHTML = '<button class="filter-btn active" onclick="filterBlog(\'all\')">All Posts</button>';
            
            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.textContent = category;
                button.onclick = () => filterBlog(category);
                filterContainer.appendChild(button);
            });
        }

        // Display posts
        function displayPosts() {
            const grid = document.getElementById('blogGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.style.display = 'none';

            // Filter by category and search
            let filteredPosts = allPosts.filter(post => {
                let matchesCategory = true;
                let matchesSearch = true;

                // Check category filter
                if (currentFilter !== 'all') {
                    const postCategories = getAllCategories(post).map(normalizeCategory);
                    matchesCategory = postCategories.includes(currentFilter);
                }

                // Check search
                if (currentSearch) {
                    const title = post.title.toLowerCase();
                    const content = post.content.toLowerCase();
                    const categories = getAllCategories(post).join(' ').toLowerCase();
                    matchesSearch = title.includes(currentSearch) || content.includes(currentSearch) || categories.includes(currentSearch);
                }

                return matchesCategory && matchesSearch;
            });

            // Show empty state if no posts
            if (filteredPosts.length === 0) {
                empty.style.display = 'block';
                grid.style.display = 'none';
                return;
            }

            // Display posts
            empty.style.display = 'none';
            grid.style.display = 'grid';
            grid.innerHTML = '';

            filteredPosts.forEach(post => {
                const date = post.datePublished ? new Date(post.datePublished.seconds * 1000) : new Date();
                const dateString = date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                const excerpt = post.content.length > 150 ? post.content.substring(0, 150) + '...' : post.content;
                const categories = getAllCategories(post);
                const categoriesHTML = categories.map(cat => 
                    `<span class="blog-category-tag">${escapeHtml(cat)}</span>`
                ).join('');

                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-card-header">
                        <h3>${escapeHtml(post.title)}</h3>
                    </div>
                    <div class="blog-card-body">
                        <div class="blog-categories">${categoriesHTML}</div>
                        <p class="blog-excerpt">${escapeHtml(excerpt)}</p>
                        <div class="blog-meta">
                            <span>${dateString}</span>
                        </div>
                        <div class="blog-actions">
                            <button class="save-blog-btn" onclick="saveBlogCard('${post.id}', '${escapeHtml(post.title)}')" id="save-${post.id}">💾 Save</button>
                            <a class="read-more" onclick="openPost('${post.id}')">Read More →</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter by category
        window.filterBlog = function(category) {
            currentFilter = category;
            currentSearch = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearchBtn').classList.remove('show');
            document.getElementById('searchResultsInfo').classList.remove('show');

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            displayPosts();
        };

        // Search by keyword
        window.handleSearchKeypress = function(event) {
            if (event.key === 'Enter') {
                handleSearch();
            }
        };

        window.handleSearch = function() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (currentSearch.length === 0) {
                clearSearch();
                return;
            }

            // Reset category filter
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('button[onclick*="\'all\'"]').classList.add('active');

            // Show search results info
            const searchResults = allPosts.filter(post => {
                const title = post.title.toLowerCase();
                const content = post.content.toLowerCase();
                const categories = getAllCategories(post).join(' ').toLowerCase();
                return title.includes(currentSearch) || content.includes(currentSearch) || categories.includes(currentSearch);
            });

            const info = document.getElementById('searchResultsInfo');
            info.textContent = `Found ${searchResults.length} result${searchResults.length !== 1 ? 's' : ''} for "${escapeHtml(currentSearch)}"`;
            info.classList.add('show');
            document.getElementById('clearSearchBtn').classList.add('show');

            displayPosts();
        };

        // Clear search
        window.clearSearch = function() {
            currentSearch = '';
            currentFilter = 'all';
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearchBtn').classList.remove('show');
            document.getElementById('searchResultsInfo').classList.remove('show');

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('button[onclick*="\'all\'"]').classList.add('active');

            displayPosts();
        };

        let currentPostId = null;

        // Open post modal
        window.openPost = function(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            currentPostId = postId;

            const date = post.datePublished ? new Date(post.datePublished.seconds * 1000) : new Date();
            const dateString = date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            const categories = getAllCategories(post);
            const categoriesHTML = categories.map(cat => 
                `<span class="modal-category-tag">${escapeHtml(cat)}</span>`
            ).join('');

            document.getElementById('modalTitle').textContent = post.title;
            document.getElementById('modalCategories').innerHTML = categoriesHTML;
            document.getElementById('modalDate').textContent = dateString;
            
            // Convert newlines to paragraphs
            const contentHTML = post.content
                .split('\n\n')
                .map(para => `<p>${escapeHtml(para)}</p>`)
                .join('');
            
            document.getElementById('modalBody').innerHTML = contentHTML;
            document.getElementById('postModal').classList.add('active');

            // Check if already saved
            checkIfBlogSaved(postId);
        };

        // Save blog from card view
        window.saveBlogCard = async function(postId, title) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            saveBlogToMember(postId, post.title);
        };

        // Save blog from modal view
        window.saveBlogModal = function() {
            if (!currentPostId) return;
            const post = allPosts.find(p => p.id === currentPostId);
            if (!post) return;

            saveBlogToMember(currentPostId, post.title);
        };

        // Add blog to member's saved posts
        let savingPostId = null; // Track if we're currently saving
        
        async function saveBlogToMember(postId, postTitle) {
            try {
                // Prevent race condition - if already saving this post, return
                if (savingPostId === postId) {
                    alert('This blog is already being saved...');
                    return;
                }
                
                savingPostId = postId;
                
                // Disable both buttons immediately
                const saveBtn = document.getElementById(`save-${postId}`);
                if (saveBtn) {
                    saveBtn.disabled = true;
                }
                const modalBtn = document.getElementById('save-modal-btn');
                if (modalBtn) {
                    modalBtn.disabled = true;
                }
                
                const user = auth.currentUser;
                if (!user) {
                    alert('Please log in to save blogs');
                    window.location.href = '/member-login/';
                    savingPostId = null;
                    return;
                }

                // Get member document by email
                const q = query(collection(db, 'members'), where('email', '==', user.email));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    alert('Member profile not found');
                    savingPostId = null;
                    if (saveBtn) saveBtn.disabled = false;
                    if (modalBtn) modalBtn.disabled = false;
                    return;
                }

                const memberDoc = snapshot.docs[0];
                const memberRef = memberDoc.ref;

                // Get current saved posts
                let savedPosts = memberDoc.data().savedPosts || [];

                // Check if already saved
                if (savedPosts.find(p => p.id === postId)) {
                    alert('This blog is already saved');
                    savingPostId = null;
                    // Mark buttons as saved
                    if (saveBtn) {
                        saveBtn.classList.add('saved');
                        saveBtn.textContent = '✓ Saved';
                        saveBtn.disabled = true;
                    }
                    if (modalBtn) {
                        modalBtn.classList.add('saved');
                        modalBtn.textContent = '✓ Saved';
                        modalBtn.disabled = true;
                    }
                    return;
                }

                // Add new saved post
                savedPosts.push({
                    id: postId,
                    title: postTitle,
                    savedDate: new Date()
                });

                // Update member document
                await updateDoc(memberRef, { savedPosts });

                alert('Blog saved successfully!');
                
                // Update button state
                if (saveBtn) {
                    saveBtn.classList.add('saved');
                    saveBtn.textContent = '✓ Saved';
                    saveBtn.disabled = true;
                }

                if (modalBtn) {
                    modalBtn.classList.add('saved');
                    modalBtn.textContent = '✓ Saved';
                    modalBtn.disabled = true;
                }
                
                savingPostId = null;
            } catch (error) {
                console.error('Error saving blog:', error);
                alert('Error saving blog');
                savingPostId = null;
                // Re-enable buttons on error
                const saveBtn = document.getElementById(`save-${postId}`);
                if (saveBtn) saveBtn.disabled = false;
                const modalBtn = document.getElementById('save-modal-btn');
                if (modalBtn) modalBtn.disabled = false;
            }
        }
                alert('Error saving blog');
            }
        }

        // Check if blog is already saved
        async function checkIfBlogSaved(postId) {
            try {
                const user = auth.currentUser;
                if (!user) return;

                // Query by email to find the member document
                const q = query(collection(db, 'members'), where('email', '==', user.email));
                const snapshot = await getDocs(q);

                if (snapshot.empty) return;

                const memberDoc = snapshot.docs[0];
                const savedPosts = memberDoc.data().savedPosts || [];
                const isSaved = savedPosts.some(p => p.id === postId);

                const modalBtn = document.getElementById('save-modal-btn');
                if (modalBtn) {
                    if (isSaved) {
                        modalBtn.classList.add('saved');
                        modalBtn.textContent = '✓ Saved';
                        modalBtn.disabled = true;
                    } else {
                        modalBtn.classList.remove('saved');
                        modalBtn.textContent = '💾 Save Blog Post';
                        modalBtn.disabled = false;
                    }
                }
            } catch (error) {
                console.error('Error checking if blog is saved:', error);
            }
        }

        // Close modal
        window.closePost = function() {
            document.getElementById('postModal').classList.remove('active');
        };

        // Close modal when clicking outside
        document.getElementById('postModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closePost();
            }
        });

        // Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closePost();
            }
        });

        // Load posts on page load
        loadBlogPosts();
    </script>
