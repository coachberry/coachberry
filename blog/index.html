<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Berry - Blog | Hockey Tips, Drills & Strategies</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/header.js"></script>
    <script src="/footer.js"></script>
    <style>
        /* Page-specific styles for blog page only */

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: var(--white);
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255, 36, 0, 0.08);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(40px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Main Content */
        .main-section {
            padding: 4rem 2rem;
            background: var(--white);
        }

        .blog-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--border);
            background: var(--white);
            color: var(--text);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .blog-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .blog-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 2rem;
            color: var(--white);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .blog-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .blog-category {
            display: inline-block;
            background: var(--accent);
            color: var(--white);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .blog-card-body {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-excerpt {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            line-height: 1.8;
            flex-grow: 1;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .read-more {
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .read-more:hover {
            color: var(--accent-light);
        }

        /* Post Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
            background: none;
            border: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
            font-size: 2rem;
        }

        .modal-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .modal-meta span {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .modal-content p {
            margin-bottom: 1.5rem;
            line-height: 1.9;
            color: var(--text);
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--light-gray);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state h3 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        /* Footer */
        footer {
            background: var(--primary-dark);
            color: var(--white);
            text-align: center;
            padding: 2.5rem;
            margin-top: 2rem;
        }

        footer p {
            margin: 0.5rem 0;
            opacity: 0.9;
        }

        /* Mobile Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--text);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--white);
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                padding: 1rem;
                gap: 0;
                z-index: 99;
            }

            nav ul.active {
                display: flex;
            }

            nav li {
                padding: 1rem 0;
                border-bottom: 1px solid var(--border);
            }

            nav li:last-child {
                border-bottom: none;
            }

            .hamburger {
                display: flex;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 1.5rem;
                max-width: 100%;
            }

            .modal h2 {
                font-size: 1.5rem;
            }

            .blog-filters {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 1rem;
            }

            .logo img {
                max-height: 35px;
            }

            .hero {
                padding: 2rem 1rem;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .main-section {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header loaded from header.js -->

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hockey Knowledge Hub</h1>
            <p>Expert tips, strategies, drills, and insights from Coach Matt Berry. Learn from 30+ years of hockey experience.</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="main-section">
        <div class="container">
            <!-- Filters -->
            <div class="blog-filters" id="filterButtons">
                <button class="filter-btn active" onclick="filterBlog('all')">All Posts</button>
            </div>

            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div class="loading-spinner"></div>
                <p>Loading blog posts...</p>
            </div>

            <!-- Blog Grid -->
            <div class="blog-grid" id="blogGrid" style="display: none;">
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <h3>No blog posts yet</h3>
                <p>Check back soon for hockey tips, strategies, and coaching insights!</p>
            </div>
        </div>
    </section>

    <!-- Post Modal -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePost()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta">
                <span id="modalCategory"></span>
                <span id="modalDate"></span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Footer loaded from footer.js -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtLNJJoVBqWdKjDxfddEkdBYAWGrnpuhw",
            authDomain: "coach-berry.firebaseapp.com",
            projectId: "coach-berry",
            storageBucket: "coach-berry.firebasestorage.app",
            messagingSenderId: "170282824286",
            appId: "1:170282824286:web:5387ec9826c38466c07acf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allPosts = [];
        let currentFilter = 'all';

        // Load blog posts
        async function loadBlogPosts() {
            try {
                const postsQuery = query(collection(db, 'blogPosts'), orderBy('datePublished', 'desc'));
                const snapshot = await getDocs(postsQuery);
                
                allPosts = [];
                const categoriesSet = new Set();
                
                snapshot.forEach(doc => {
                    const post = doc.data();
                    allPosts.push({
                        id: doc.id,
                        ...post
                    });
                    // Collect unique categories (handle both old and new format)
                    if (post.categories && Array.isArray(post.categories)) {
                        post.categories.forEach(cat => categoriesSet.add(cat));
                    } else if (post.category) {
                        categoriesSet.add(post.category);
                    }
                });

                // Generate filter buttons dynamically
                generateFilterButtons(Array.from(categoriesSet).sort());
                displayPosts();
            } catch (error) {
                console.error('Error loading blog posts:', error);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        // Generate filter buttons based on actual categories
        function generateFilterButtons(categories) {
            const filterContainer = document.getElementById('filterButtons');
            filterContainer.innerHTML = '<button class="filter-btn active" onclick="filterBlog(\'all\')">All Posts</button>';
            
            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.textContent = category;
                button.onclick = () => filterBlog(category);
                filterContainer.appendChild(button);
            });
        }

        // Display posts
        function displayPosts() {
            const grid = document.getElementById('blogGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.style.display = 'none';

            let filteredPosts = allPosts;
            if (currentFilter !== 'all') {
                filteredPosts = allPosts.filter(post => post.category === currentFilter);
            }

            if (filteredPosts.length === 0) {
                empty.style.display = 'block';
                grid.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            grid.style.display = 'grid';
            grid.innerHTML = '';

            filteredPosts.forEach(post => {
                const date = post.datePublished ? new Date(post.datePublished.seconds * 1000) : new Date();
                const dateString = date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                const excerpt = post.content.length > 150 ? post.content.substring(0, 150) + '...' : post.content;

                // Handle both old (category) and new (categories) format
                const primaryCategory = Array.isArray(post.categories) ? post.categories[0] : post.category;

                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-card-header">
                        <h3>${escapeHtml(post.title)}</h3>
                        <div class="blog-category">${escapeHtml(primaryCategory)}</div>
                    </div>
                    <div class="blog-card-body">
                        <p class="blog-excerpt">${escapeHtml(excerpt)}</p>
                        <div class="blog-meta">
                            <span>${dateString}</span>
                            <a class="read-more" onclick="openPost('${post.id}')">Read More →</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter posts
        window.filterBlog = function(category) {
            currentFilter = category;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            displayPosts();
        };

        // Display posts
        function displayPosts() {
            const grid = document.getElementById('blogGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.style.display = 'none';

            let filteredPosts = allPosts;
            if (currentFilter !== 'all') {
                filteredPosts = allPosts.filter(post => {
                    // Handle both old (category) and new (categories) format
                    if (Array.isArray(post.categories)) {
                        return post.categories.includes(currentFilter);
                    } else {
                        return post.category === currentFilter;
                    }
                });
            }

        // Open post modal
        window.openPost = function(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const date = post.datePublished ? new Date(post.datePublished.seconds * 1000) : new Date();
            const dateString = date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            document.getElementById('modalTitle').textContent = post.title;
            document.getElementById('modalCategory').innerHTML = `<span class="blog-category">${escapeHtml(post.category)}</span>`;
            document.getElementById('modalDate').textContent = dateString;
            
            // Convert newlines to paragraphs
            const contentHTML = post.content
                .split('\n\n')
                .map(para => `<p>${escapeHtml(para)}</p>`)
                .join('');
            
            document.getElementById('modalBody').innerHTML = contentHTML;
            document.getElementById('postModal').classList.add('active');
        };

        // Close modal
        window.closePost = function() {
            document.getElementById('postModal').classList.remove('active');
        };

        // Close modal when clicking outside
        document.getElementById('postModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closePost();
            }
        });

        // Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closePost();
            }
        });

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load posts on page load
        loadBlogPosts();
    </script>

    <script>
        // Header mobile menu is handled by header.js
    </script>
</body>
</html>
