<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
    }

    .stat-card {
        background: var(--white);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        border-top: 4px solid var(--accent);
    }

    .stat-card h4 {
        color: var(--text-light);
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
    }

    .stat-card .count {
        font-size: 2rem;
        font-weight: 800;
        color: var(--accent);
    }

    .controls {
        background: var(--white);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        margin-bottom: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
    }

    .controls input,
    .controls select {
        padding: 0.8rem;
        border: 2px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
    }

    .controls input:focus,
    .controls select:focus {
        outline: none;
        border-color: var(--accent);
    }

    .controls input {
        flex: 1;
        min-width: 200px;
    }

    .table-container {
        background: var(--white);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: var(--light-gray);
        border-bottom: 2px solid var(--border);
    }

    th {
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        color: var(--text);
    }

    td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
        background: var(--light-gray);
    }

    .role-badge {
        display: inline-block;
        padding: 0.3rem 0.8rem;
        background: var(--accent);
        color: var(--white);
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
        margin-right: 0.3rem;
        text-transform: capitalize;
    }

    .action-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
        margin-right: 0.5rem;
    }

    .action-btn-edit {
        background: var(--accent);
        color: var(--white);
    }

    .action-btn-edit:hover {
        background: var(--accent-light);
    }

    .action-btn-delete {
        background: var(--danger);
        color: var(--white);
    }

    .action-btn-delete:hover {
        background: #d32f2f;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.6);
        overflow-y: auto;
    }

    .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .modal-content {
        background: var(--white);
        padding: 2rem;
        border-radius: 12px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--text-light);
    }

    .modal-close:hover {
        color: var(--text);
    }

    .modal h2 {
        margin-bottom: 1.5rem;
        color: var(--primary-dark);
    }

    .member-info {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: var(--light-gray);
        border-radius: 6px;
    }

    .member-info label {
        display: block;
        font-weight: 600;
        color: var(--text-light);
        font-size: 0.9rem;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
    }

    .member-info p {
        color: var(--text);
        font-size: 1.1rem;
        margin: 0;
    }

    .permission-section {
        background: var(--light-gray);
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1.5rem 0;
    }

    .permission-section h3 {
        margin-bottom: 1rem;
        color: var(--text);
        font-size: 1.1rem;
    }

    .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
    }

    .checkbox-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    .checkbox-item label {
        cursor: pointer;
        margin: 0;
        font-weight: normal;
        color: var(--text);
    }

    .save-permissions-btn {
        margin-top: 1rem;
        padding: 0.7rem 1.5rem;
        background: var(--success);
        color: var(--white);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
    }

    .save-permissions-btn:hover {
        background: #45a049;
    }

    .permission-message {
        padding: 0.8rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        display: none;
        font-weight: 500;
    }

    .permission-message.show {
        display: block;
    }

    .permission-message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid var(--success);
    }
</style>

<div class="stats-grid">
    <div class="stat-card">
        <h4>Total Members</h4>
        <div class="count" id="statTotalMembers">0</div>
    </div>
    <div class="stat-card">
        <h4>Players</h4>
        <div class="count" id="statPlayers">0</div>
    </div>
    <div class="stat-card">
        <h4>Coaches</h4>
        <div class="count" id="statCoaches">0</div>
    </div>
    <div class="stat-card">
        <h4>Parents</h4>
        <div class="count" id="statParents">0</div>
    </div>
</div>

<div class="controls">
    <input type="text" id="memberSearch" placeholder="Search by name or email..." onkeyup="filterMembersTable()">
    <select id="memberRoleFilter" onchange="filterMembersTable()">
        <option value="">All Roles</option>
        <option value="player">Players</option>
        <option value="coach">Coaches</option>
        <option value="parent">Parents</option>
    </select>
</div>

<div class="table-container">
    <table id="memberTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Roles</th>
                <th>Joined</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="memberTableBody">
            <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading members...</td></tr>
        </tbody>
    </table>
</div>

<div class="modal" id="memberModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeMemberModal()">&times;</button>
        <h2>Member Details & Permissions</h2>
        <div id="memberDetails"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const config = window.getFirebaseConfig();
    const app = initializeApp(config);
    const db = getFirestore(app);

    let allMembersData = [];
    let editingMemberId = null;

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'N/A';
        const date = new Date(timestamp.seconds * 1000);
        return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadMembers() {
        try {
            const membersQuery = query(collection(db, 'members'), orderBy('dateJoined', 'desc'));
            const snapshot = await getDocs(membersQuery);
            allMembersData = [];

            snapshot.forEach(doc => {
                allMembersData.push({ id: doc.id, ...doc.data() });
            });

            updateMembersStats();
            displayMembersTable(allMembersData);
        } catch (error) {
            console.error('Error loading members:', error);
        }
    }

    function updateMembersStats() {
        document.getElementById('statTotalMembers').textContent = allMembersData.length;
        const players = allMembersData.filter(m => m.roles && m.roles.includes('player')).length;
        const coaches = allMembersData.filter(m => m.roles && m.roles.includes('coach')).length;
        const parents = allMembersData.filter(m => m.roles && m.roles.includes('parent')).length;
        
        document.getElementById('statPlayers').textContent = players;
        document.getElementById('statCoaches').textContent = coaches;
        document.getElementById('statParents').textContent = parents;
    }

    function displayMembersTable(members) {
        const tbody = document.getElementById('memberTableBody');
        tbody.innerHTML = '';

        if (members.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No members found.</td></tr>';
            return;
        }

        members.forEach(member => {
            const dateJoined = formatDate(member.dateJoined);
            const rolesBadges = (member.roles || []).map(role => `<span class="role-badge">${role}</span>`).join('');
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${escapeHtml(member.firstName)} ${escapeHtml(member.lastName)}</strong></td>
                <td>${escapeHtml(member.email)}</td>
                <td>${escapeHtml(member.phone)}</td>
                <td>${rolesBadges}</td>
                <td>${dateJoined}</td>
                <td>
                    <button class="action-btn action-btn-edit" onclick="window.viewMemberDetails('${member.id}')">View</button>
                    <button class="action-btn action-btn-delete" onclick="window.deleteMember('${member.id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.filterMembersTable = function() {
        const searchTerm = document.getElementById('memberSearch').value.toLowerCase();
        const roleFilter = document.getElementById('memberRoleFilter').value;

        const filtered = allMembersData.filter(member => {
            const matchesSearch = `${member.firstName} ${member.lastName}`.toLowerCase().includes(searchTerm) ||
                                 member.email.toLowerCase().includes(searchTerm);
            const matchesRole = !roleFilter || (member.roles && member.roles.includes(roleFilter));
            return matchesSearch && matchesRole;
        });

        displayMembersTable(filtered);
    };

    window.viewMemberDetails = function(memberId) {
        const member = allMembersData.find(m => m.id === memberId);
        if (!member) return;

        editingMemberId = memberId;

        let html = `
            <div class="permission-message" id="permissionMessage"></div>
            <div class="member-info">
                <label>Name</label>
                <p>${escapeHtml(member.firstName)} ${escapeHtml(member.lastName)}</p>
            </div>
            <div class="member-info">
                <label>Email</label>
                <p>${escapeHtml(member.email)}</p>
            </div>
            <div class="member-info">
                <label>Phone</label>
                <p>${escapeHtml(member.phone)}</p>
            </div>
            <div class="member-info">
                <label>Roles</label>
                <p>${(member.roles || []).join(', ')}</p>
            </div>
        `;

        if (member.roles && member.roles.includes('parent') && member.children && member.children.length > 0) {
            html += `<div class="member-info"><label>Children</label><p>`;
            member.children.forEach((child, index) => {
                html += `Child ${index + 1}: Birth Year ${child.birthYear}, Gender: ${child.gender}${child.team ? `, Team: ${child.team}` : ''}<br>`;
            });
            html += `</p></div>`;
        }

        if (member.roles && member.roles.includes('coach')) {
            html += `
                <div class="member-info">
                    <label>Coaching Level</label>
                    <p>${member.coachLevel || 'Not specified'}</p>
                </div>
                <div class="member-info">
                    <label>Current Team</label>
                    <p>${member.teamCoach || 'Not specified'}</p>
                </div>
            `;
        }

        html += `
            <div class="member-info">
                <label>Date Joined</label>
                <p>${formatDate(member.dateJoined)}</p>
            </div>

            <div class="permission-section">
                <h3>Member Permissions</h3>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-view-dashboard" ${(member.permissions?.viewDashboard !== false) ? 'checked' : ''}>
                        <label for="perm-view-dashboard">Can Access Member Dashboard</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-save-posts" ${(member.permissions?.saveBlogPosts !== false) ? 'checked' : ''}>
                        <label for="perm-save-posts">Can Save Blog Posts</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-messaging" ${(member.permissions?.useMessaging !== false) ? 'checked' : ''}>
                        <label for="perm-messaging">Can Use Messaging System</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-view-content" ${(member.permissions?.viewContent !== false) ? 'checked' : ''}>
                        <label for="perm-view-content">Can View Member Content</label>
                    </div>
                </div>
                <button class="save-permissions-btn" onclick="window.savePermissions()">Save Permissions</button>
            </div>
        `;

        document.getElementById('memberDetails').innerHTML = html;
        document.getElementById('memberModal').classList.add('active');
    };

    window.savePermissions = async function() {
        if (!editingMemberId) return;

        const permissions = {
            viewDashboard: document.getElementById('perm-view-dashboard').checked,
            saveBlogPosts: document.getElementById('perm-save-posts').checked,
            useMessaging: document.getElementById('perm-messaging').checked,
            viewContent: document.getElementById('perm-view-content').checked
        };

        const messageDiv = document.getElementById('permissionMessage');

        try {
            await updateDoc(doc(db, 'members', editingMemberId), {
                permissions: permissions,
                permissionsUpdated: new Date()
            });

            messageDiv.textContent = '✓ Permissions updated successfully!';
            messageDiv.classList.add('show', 'success');

            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);

            loadMembers();
        } catch (error) {
            messageDiv.textContent = 'Error updating permissions: ' + error.message;
            messageDiv.classList.add('show', 'error');
            console.error('Error:', error);
        }
    };

    window.closeMemberModal = function() {
        document.getElementById('memberModal').classList.remove('active');
        editingMemberId = null;
    };

    window.deleteMember = function(memberId) {
        const member = allMembersData.find(m => m.id === memberId);
        if (!member) return;

        if (confirm(`Are you sure you want to delete ${member.firstName} ${member.lastName}?`)) {
            deleteDoc(doc(db, 'members', memberId))
                .then(() => {
                    alert(`${member.firstName} ${member.lastName} has been deleted`);
                    loadMembers();
                })
                .catch(error => {
                    alert('Error deleting member: ' + error.message);
                });
        }
    };

    // Expose to window so it can be called after tab loads
    window.loadMembers = loadMembers;
</script>
