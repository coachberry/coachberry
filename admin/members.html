<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
    }

    .stat-card {
        background: var(--white);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        border-top: 4px solid var(--accent);
    }

    .stat-card h4 {
        color: var(--text-light);
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
    }

    .stat-card .count {
        font-size: 2rem;
        font-weight: 800;
        color: var(--accent);
    }

    .controls {
        background: var(--white);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        margin-bottom: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
    }

    .controls input,
    .controls select {
        padding: 0.8rem;
        border: 2px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
    }

    .controls input:focus,
    .controls select:focus {
        outline: none;
        border-color: var(--accent);
    }

    .controls input {
        flex: 1;
        min-width: 200px;
    }

    .table-container {
        background: var(--white);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: var(--light-gray);
        border-bottom: 2px solid var(--border);
    }

    th {
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        color: var(--text);
    }

    td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
        background: var(--light-gray);
    }

    .role-badge {
        display: inline-block;
        padding: 0.3rem 0.8rem;
        background: var(--accent);
        color: var(--white);
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
        margin-right: 0.3rem;
        text-transform: capitalize;
    }

    .action-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
        margin-right: 0.5rem;
    }

    .action-btn-edit {
        background: var(--accent);
        color: var(--white);
    }

    .action-btn-edit:hover {
        background: var(--accent-light);
    }

    .action-btn-delete {
        background: var(--danger);
        color: var(--white);
    }

    .action-btn-delete:hover {
        background: #d32f2f;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.6);
        overflow-y: auto;
    }

    .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .modal-content {
        background: var(--white);
        padding: 2rem;
        border-radius: 12px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--text-light);
    }

    .modal-close:hover {
        color: var(--text);
    }

    .modal h2 {
        margin-bottom: 1.5rem;
        color: var(--primary-dark);
    }

    .member-info {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: var(--light-gray);
        border-radius: 6px;
    }

    .member-info label {
        display: block;
        font-weight: 600;
        color: var(--text-light);
        font-size: 0.9rem;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
    }

    .member-info p {
        color: var(--text);
        font-size: 1.1rem;
        margin: 0;
    }

    .permission-section {
        background: var(--light-gray);
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1.5rem 0;
    }

    .permission-section h3 {
        margin-bottom: 1rem;
        color: var(--text);
        font-size: 1.1rem;
    }

    .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
    }

    .checkbox-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    .checkbox-item label {
        cursor: pointer;
        margin: 0;
        font-weight: normal;
        color: var(--text);
    }

    .save-permissions-btn {
        margin-top: 1rem;
        padding: 0.7rem 1.5rem;
        background: var(--success);
        color: var(--white);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
    }

    .save-permissions-btn:hover {
        background: #45a049;
    }

    .permission-message {
        padding: 0.8rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        display: none;
        font-weight: 500;
    }

    .permission-message.show {
        display: block;
    }

    .permission-message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid var(--success);
    }
</style>

<div class="stats-grid">
    <div class="stat-card">
        <h4>Total Members</h4>
        <div class="count" id="statTotalMembers">0</div>
    </div>
    <div class="stat-card">
        <h4>Players</h4>
        <div class="count" id="statPlayers">0</div>
    </div>
    <div class="stat-card">
        <h4>Coaches</h4>
        <div class="count" id="statCoaches">0</div>
    </div>
    <div class="stat-card">
        <h4>Parents</h4>
        <div class="count" id="statParents">0</div>
    </div>
</div>

<div class="controls">
    <input type="text" id="memberSearch" placeholder="Search by name or email..." onkeyup="filterMembersTable()">
    <select id="memberRoleFilter" onchange="filterMembersTable()">
        <option value="">All Roles</option>
        <option value="player">Players</option>
        <option value="coach">Coaches</option>
        <option value="parent">Parents</option>
    </select>
</div>

<div class="table-container">
    <table id="memberTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Roles</th>
                <th>Joined</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="memberTableBody">
            <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading members...</td></tr>
        </tbody>
    </table>
</div>

<div class="modal" id="memberModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeMemberModal()">&times;</button>
        <h2>Member Details & Permissions</h2>
        <div id="memberDetails"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc, updateDoc, setDoc, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const config = window.getFirebaseConfig();
    const app = initializeApp(config);
    const db = getFirestore(app);

    let allMembersData = [];
    let editingMemberId = null;

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'N/A';
        const date = new Date(timestamp.seconds * 1000);
        return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadMembers() {
        try {
            const [membersSnap, goaliesSnap] = await Promise.all([
                getDocs(collection(db, 'members')),
                getDocs(collection(db, 'goalies'))
            ]);
            allMembersData = [];
            const emailsSeen = new Set();

            membersSnap.forEach(d => {
                const data = { id: d.id, ...d.data() };
                data.dateJoined = data.dateJoined || data.createdAt || null;
                if (data.email) emailsSeen.add(data.email);
                allMembersData.push(data);
            });

            goaliesSnap.forEach(d => {
                const data = d.data();
                if (data.email && !emailsSeen.has(data.email)) {
                    allMembersData.push({
                        id: d.id,
                        firstName: data.firstName || '',
                        lastName: data.lastName || '',
                        email: data.email || '',
                        phone: '',
                        roles: ['member', '3d-goalie'],
                        dateJoined: data.createdAt || null,
                        source: 'goalies'
                    });
                    emailsSeen.add(data.email);
                }
            });

            allMembersData.sort((a,b) => (b.dateJoined||0) - (a.dateJoined||0));
            updateMembersStats();
            displayMembersTable(allMembersData);
        } catch (error) {
            console.error('Error loading members:', error);
        }
    }

    function updateMembersStats() {
        document.getElementById('statTotalMembers').textContent = allMembersData.length;
        const players = allMembersData.filter(m => m.roles && m.roles.includes('player')).length;
        const coaches = allMembersData.filter(m => m.roles && m.roles.includes('coach')).length;
        const parents = allMembersData.filter(m => m.roles && m.roles.includes('parent')).length;
        
        document.getElementById('statPlayers').textContent = players;
        document.getElementById('statCoaches').textContent = coaches;
        document.getElementById('statParents').textContent = parents;
    }

    function displayMembersTable(members) {
        const tbody = document.getElementById('memberTableBody');
        tbody.innerHTML = '';

        if (members.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No members found.</td></tr>';
            return;
        }

        members.forEach(member => {
            const dateJoined = formatDate(member.dateJoined);
            const rolesBadges = (member.roles || []).map(role => `<span class="role-badge">${role}</span>`).join('');
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${escapeHtml(member.firstName)} ${escapeHtml(member.lastName)}</strong></td>
                <td>${escapeHtml(member.email)}</td>
                <td>${escapeHtml(member.phone)}</td>
                <td>${rolesBadges}</td>
                <td>${dateJoined}</td>
                <td>
                    <button class="action-btn action-btn-edit" onclick="window.viewMemberDetails('${member.id}')">View</button>
                    <button class="action-btn action-btn-delete" onclick="window.deleteMember('${member.id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.filterMembersTable = function() {
        const searchTerm = document.getElementById('memberSearch').value.toLowerCase();
        const roleFilter = document.getElementById('memberRoleFilter').value;

        const filtered = allMembersData.filter(member => {
            const matchesSearch = `${member.firstName} ${member.lastName}`.toLowerCase().includes(searchTerm) ||
                                 member.email.toLowerCase().includes(searchTerm);
            const matchesRole = !roleFilter || (member.roles && member.roles.includes(roleFilter));
            return matchesSearch && matchesRole;
        });

        displayMembersTable(filtered);
    };

    window.viewMemberDetails = function(memberId) {
        const member = allMembersData.find(m => m.id === memberId);
        if (!member) return;

        editingMemberId = memberId;

        let html = `
            <div class="permission-message" id="permissionMessage"></div>
            <div class="member-info">
                <label>Name</label>
                <p>${escapeHtml(member.firstName)} ${escapeHtml(member.lastName)}</p>
            </div>
            <div class="member-info">
                <label>Email</label>
                <p>${escapeHtml(member.email)}</p>
            </div>
            <div class="member-info">
                <label>Phone</label>
                <p>${escapeHtml(member.phone)}</p>
            </div>
            <div class="member-info">
                <label>Roles</label>
                <p>${(member.roles || []).join(', ')}</p>
            </div>
        `;

        if (member.roles && member.roles.includes('parent') && member.children && member.children.length > 0) {
            html += `<div class="member-info"><label>Children</label><p>`;
            member.children.forEach((child, index) => {
                html += `Child ${index + 1}: Birth Year ${child.birthYear}, Gender: ${child.gender}${child.team ? `, Team: ${child.team}` : ''}<br>`;
            });
            html += `</p></div>`;
        }

        // Role assignment section
        const currentRoles = member.roles || ['member'];
        const allRoles = ['member','player','coach','parent','3d-goalie','3d-player','3d-hockey'];
        const roleLabels = {'member':'Member','player':'Player','coach':'Coach','parent':'Parent','3d-goalie':'3D Goalie','3d-player':'3D Player','3d-hockey':'3D Hockey'};
        
        const roleHTML = `<div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #e0e0e0;">
            <h4 style="margin-bottom:0.8rem;font-size:0.9rem;font-weight:700;">Assign Roles</h4>
            <div style="display:flex;flex-wrap:wrap;gap:0.5rem;" id="roleCheckboxes_${member.id}">
                ${allRoles.map(r => `<label style="display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border:1.5px solid ${currentRoles.includes(r)?'#FF2400':'#e0e0e0'};border-radius:6px;cursor:pointer;font-size:0.82rem;font-weight:600;background:${currentRoles.includes(r)?'#fff5f5':'white'};">
                    <input type="checkbox" value="${r}" ${currentRoles.includes(r)?'checked':''} onchange="updateRoleStyle(this)"> ${roleLabels[r]}
                </label>`).join('')}
            </div>
            <button onclick="saveRoles('${member.id}', '${member.source||'members'}')" style="margin-top:0.8rem;padding:0.5rem 1.2rem;background:#FF2400;color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:0.85rem;">Save Roles</button>
            <span id="roleSaveMsg_${member.id}" style="display:none;margin-left:0.8rem;font-size:0.82rem;font-weight:600;color:#16a34a;">Saved!</span>
        </div>`;

        if (member.roles && member.roles.includes('coach')) {
            html += `
                <div class="member-info">
                    <label>Coaching Level</label>
                    <p>${member.coachLevel || 'Not specified'}</p>
                </div>
                <div class="member-info">
                    <label>Current Team</label>
                    <p>${member.teamCoach || 'Not specified'}</p>
                </div>
            `;
        }

        html += `
            <div class="member-info">
                <label>Date Joined</label>
                <p>${formatDate(member.dateJoined)}</p>
            </div>

            <div class="permission-section">
                <h3>Member Permissions</h3>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-view-dashboard" ${(member.permissions?.viewDashboard !== false) ? 'checked' : ''}>
                        <label for="perm-view-dashboard">Can Access Member Dashboard</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-save-posts" ${(member.permissions?.saveBlogPosts !== false) ? 'checked' : ''}>
                        <label for="perm-save-posts">Can Save Blog Posts</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-messaging" ${(member.permissions?.useMessaging !== false) ? 'checked' : ''}>
                        <label for="perm-messaging">Can Use Messaging System</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="perm-view-content" ${(member.permissions?.viewContent !== false) ? 'checked' : ''}>
                        <label for="perm-view-content">Can View Member Content</label>
                    </div>
                </div>
                <button class="save-permissions-btn" onclick="window.savePermissions()">Save Permissions</button>
            </div>
        `;

        document.getElementById('memberDetails').innerHTML = html;
        document.getElementById('memberModal').classList.add('active');
    };

    window.savePermissions = async function() {
        if (!editingMemberId) return;

        const permissions = {
            viewDashboard: document.getElementById('perm-view-dashboard').checked,
            saveBlogPosts: document.getElementById('perm-save-posts').checked,
            useMessaging: document.getElementById('perm-messaging').checked,
            viewContent: document.getElementById('perm-view-content').checked
        };

        const messageDiv = document.getElementById('permissionMessage');

        try {
            await updateDoc(doc(db, 'members', editingMemberId), {
                permissions: permissions,
                permissionsUpdated: new Date()
            });

            messageDiv.textContent = '✓ Permissions updated successfully!';
            messageDiv.classList.add('show', 'success');

            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);

            loadMembers();
        } catch (error) {
            messageDiv.textContent = 'Error updating permissions: ' + error.message;
            messageDiv.classList.add('show', 'error');
            console.error('Error:', error);
        }
    };

    window.closeMemberModal = function() {
        document.getElementById('memberModal').classList.remove('active');
        editingMemberId = null;
    };

    window.deleteMember = async function(memberId) {
        const member = allMembersData.find(m => m.id === memberId);
        if (!member) return;

        if (confirm(`Are you sure you want to delete ${member.firstName} ${member.lastName}? This will delete both their profile and login account.`)) {
            try {
                // Call Firebase Cloud Function to delete from Auth
                const deleteAuthResponse = await fetch('https://us-central1-coach-berry.cloudfunctions.net/deleteUserAuth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: member.email
                    })
                });

                // Delete from Firestore
                await deleteDoc(doc(db, 'members', memberId));

                alert(`${member.firstName} ${member.lastName} has been deleted from both profile and login system`);
                loadMembers();
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting member: ' + error.message);
            }
        }
    };

    // Expose to window so it can be called after tab loads
    window.updateRoleStyle = function(checkbox) {
        const label = checkbox.parentElement;
        if (checkbox.checked) {
            label.style.borderColor = '#FF2400';
            label.style.background = '#fff5f5';
        } else {
            label.style.borderColor = '#e0e0e0';
            label.style.background = 'white';
        }
    };

    window.saveRoles = async function(memberId, source) {
        const checkboxes = document.querySelectorAll(`#roleCheckboxes_${memberId} input[type=checkbox]`);
        const roles = [...checkboxes].filter(c => c.checked).map(c => c.value);
        if (!roles.includes('member')) roles.unshift('member');
        try {
            if (source === 'goalies') {
                await updateDoc(doc(db, 'goalies', memberId), { roles });
            } else {
                await updateDoc(doc(db, 'members', memberId), { roles, updatedAt: Date.now() });
            }

            // If 3d-goalie role assigned, auto-create goalie profile if it doesn't exist
            if (roles.includes('3d-goalie') && source !== 'goalies') {
                const memberSnap = await getDoc(doc(db, 'members', memberId));
                if (memberSnap.exists()) {
                    const m = memberSnap.data();
                    // Check if goalie doc already exists for this email
                    const goaliesSnap = await getDocs(collection(db, 'goalies'));
                    let existingGoalie = null;
                    goaliesSnap.forEach(d => { if (d.data().email === m.email) existingGoalie = d.id; });
                    if (!existingGoalie) {
                        await addDoc(collection(db, 'goalies'), {
                            firstName: m.firstName || '',
                            lastName: m.lastName || '',
                            email: m.email || '',
                            team: m.currentTeam || '',
                            level: '',
                            gloveSide: 'left',
                            style: '',
                            accountLinked: true,
                            memberId: memberId,
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        });
                        console.log('Auto-created goalie profile for', m.email);
                    }
                }
            }

            const msg = document.getElementById(`roleSaveMsg_${memberId}`);
            if (msg) { msg.style.display = 'inline'; setTimeout(() => msg.style.display = 'none', 2000); }
            loadMembers();
        } catch(e) { alert('Error saving roles: ' + e.message); }
    };

    window.loadMembers = loadMembers;
</script>
