<style>
    .form-card {
        background: var(--white);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        margin-bottom: 2rem;
    }

    .form-card h2 {
        margin-bottom: 1.5rem;
        color: var(--primary-dark);
        font-size: 1.5rem;
    }

    .message {
        padding: 1rem;
        border-radius: 6px;
        margin-bottom: 1.5rem;
        display: none;
        font-weight: 500;
    }

    .message.show {
        display: block;
    }

    .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid var(--success);
    }

    .message.error {
        background: #ffebee;
        color: #c62828;
        border-left: 4px solid var(--danger);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-weight: 600;
        margin-bottom: 0.6rem;
        color: var(--text);
    }

    .form-group textarea {
        padding: 0.9rem;
        border: 2px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
        font-family: inherit;
        resize: vertical;
        min-height: 150px;
        transition: all 0.3s ease;
    }

    .form-group textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(255, 36, 0, 0.1);
    }

    .submit-btn {
        padding: 0.9rem 2rem;
        background: var(--accent);
        color: var(--white);
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
    }

    .submit-btn:hover {
        background: var(--accent-light);
        transform: translateY(-2px);
    }

    .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .updates-list {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin-top: 2rem;
    }

    .update-card {
        background: var(--white);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        border-left: 4px solid var(--accent);
    }

    .update-card p {
        margin-bottom: 1rem;
        line-height: 1.6;
    }

    .update-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        font-size: 0.9rem;
        color: var(--text-light);
    }

    .action-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
    }

    .action-btn-delete {
        background: var(--danger);
        color: var(--white);
    }

    .action-btn-delete:hover {
        background: #d32f2f;
    }

    .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-light);
    }
</style>

<div class="form-card">
    <h2>Post a Quick Update</h2>
    <div class="message" id="updateMessage"></div>
    <form id="updateForm" onsubmit="window.handleUpdateSubmit(event)">
        <div class="form-row">
            <div class="form-group">
                <label for="updateContent">Update Content *</label>
                <textarea id="updateContent" name="content" placeholder="Share a quick update, announcement, or news..." required></textarea>
            </div>
        </div>
        <button type="submit" class="submit-btn" id="updateSubmitBtn">Post Update</button>
    </form>
</div>

<h2 style="margin-top: 2rem;">Recent Updates</h2>
<div id="updatesList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import { firebaseConfig, escapeHtml, formatDate } from "./shared.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allUpdates = [];

    window.handleUpdateSubmit = async function(event) {
        event.preventDefault();
        const content = document.getElementById('updateContent').value;
        const submitBtn = document.getElementById('updateSubmitBtn');
        const messageDiv = document.getElementById('updateMessage');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span> Posting...';
        messageDiv.classList.remove('show');

        try {
            await addDoc(collection(db, 'updates'), {
                content: content,
                datePosted: new Date(),
                author: window.getCurrentUser().email
            });

            messageDiv.textContent = '✓ Update posted successfully!';
            messageDiv.classList.add('show', 'success');
            document.getElementById('updateForm').reset();
            loadUpdates();

            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);
        } catch (error) {
            messageDiv.textContent = 'Error posting update: ' + error.message;
            messageDiv.classList.add('show', 'error');
            console.error('Error:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Post Update';
        }
    };

    async function loadUpdates() {
        try {
            const updatesQuery = query(collection(db, 'updates'), orderBy('datePosted', 'desc'));
            const snapshot = await getDocs(updatesQuery);
            const updatesList = document.getElementById('updatesList');
            updatesList.innerHTML = '';

            allUpdates = [];
            snapshot.forEach(doc => {
                allUpdates.push({
                    id: doc.id,
                    ...doc.data()
                });
            });

            if (allUpdates.length === 0) {
                updatesList.innerHTML = '<div class="empty-state"><h3>No updates yet</h3><p>Post your first update above</p></div>';
                return;
            }

            allUpdates.forEach(update => {
                const datePosted = formatDate(update.datePosted);
                
                const card = document.createElement('div');
                card.className = 'update-card';
                card.innerHTML = `
                    <p>${escapeHtml(update.content)}</p>
                    <div class="update-meta">
                        <span>${datePosted}</span>
                        <button class="action-btn action-btn-delete" onclick="window.deleteUpdate('${update.id}')">Delete</button>
                    </div>
                `;
                updatesList.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading updates:', error);
        }
    }

    window.deleteUpdate = function(updateId) {
        if (confirm('Are you sure you want to delete this update?')) {
            deleteDoc(doc(db, 'updates', updateId))
                .then(() => {
                    loadUpdates();
                })
                .catch(error => {
                    alert('Error deleting update: ' + error.message);
                });
        }
    };

    loadUpdates();
</script>
