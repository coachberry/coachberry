<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Berry - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #000000;
            --primary: #1a1a1a;
            --secondary: #2d2d2d;
            --accent: #FF2400;
            --accent-light: #FF3a1f;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --text: #1a1a1a;
            --text-light: #4a4a4a;
            --border: #e0e0e0;
            --success: #4CAF50;
            --danger: #f44336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            line-height: 1.6;
            background: var(--light-gray);
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-box img {
            max-width: 100%;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .login-box .subtitle {
            text-align: center;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 36, 0, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        .sidebar {
            width: 250px;
            background: var(--primary-dark);
            color: var(--white);
            padding: 2rem 1rem;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .sidebar-logo img {
            max-width: 100%;
            height: auto;
            max-height: 60px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .menu-item {
            display: block;
            padding: 0.9rem 1rem;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        .menu-item.active {
            background: var(--accent);
            color: var(--white);
            border-left-color: var(--white);
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.12);
            margin: 0.8rem 0.5rem;
        }

        .sidebar-section-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            padding: 0.4rem 1rem 0.2rem;
        }

        .logout-btn {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            padding: 0.9rem;
            background: var(--danger);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: calc(100% - 2rem);
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        main {
            margin-left: 250px;
            flex: 1;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
            }

            main {
                margin-left: 0;
            }

            .logout-btn {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                width: 100%;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <img src="https://coachberry.github.io/coachberry/CoachBerryLOGO-transparent-lightbg.png" alt="Coach Berry Logo">
            <div class="subtitle">Admin Dashboard</div>
            <div class="error-message" id="loginError"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard hidden">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="https://coachberry.github.io/coachberry/CoachBerryLOGO-transparent.png" alt="Coach Berry Logo">
            </div>
            <ul class="sidebar-menu">
                <div class="sidebar-section-label">Site Management</div>
                <li><a onclick="switchTab('overview')" class="menu-item active" data-tab="overview">📊 Overview</a></li>
                <li><a onclick="switchTab('members')" class="menu-item" data-tab="members">👥 Members</a></li>
                <li><a onclick="switchTab('notifications')" class="menu-item" data-tab="notifications">🔔 Notifications <span id="notifBadge" style="display:none;background:#FF2400;color:white;border-radius:50%;width:20px;height:20px;font-size:0.7rem;font-weight:bold;display:inline-flex;align-items:center;justify-content:center;margin-left:0.5rem;">0</span></a></li>
                <li><a onclick="switchTab('blog')" class="menu-item" data-tab="blog">📝 Blog Posts</a></li>
                <li><a onclick="switchTab('updates')" class="menu-item" data-tab="updates">📢 Updates</a></li>
                <li><a onclick="switchTab('inbox')" class="menu-item" data-tab="inbox">📧 Inbox <span id="adminInboxUnreadBadge" style="display: none; background: #FF2400; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; margin-left: 0.5rem;">0</span></a></li>
                <hr class="sidebar-divider">
                <div class="sidebar-section-label">Coaching</div>
                <li><a onclick="switchTab('goalies')" class="menu-item" data-tab="goalies">🥅 Goalies</a></li>
                <hr class="sidebar-divider">
                <div class="sidebar-section-label">My Portfolio</div>
                <li><a onclick="switchTab('resume')" class="menu-item" data-tab="resume">🏒 Coaching Resume</a></li>
                <li><a onclick="switchTab('book-club')" class="menu-item" data-tab="book-club">📚 Book Club</a></li>
                <li><a onclick="switchTab('vault')" class="menu-item" data-tab="vault">🔐 The Vault</a></li>
                <hr class="sidebar-divider">
                <div class="sidebar-section-label">Website</div>
                <li><a onclick="switchTab('content')" class="menu-item" data-tab="content">✏️ Edit Website</a></li>
            </ul>
            <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
        </aside>

        <main>
            <div class="dashboard-header">
                <h1 id="pageTitle">Admin Dashboard</h1>
            </div>

            <div id="overview" class="tab-content active"></div>
            <div id="members" class="tab-content"></div>
            <div id="notifications" class="tab-content"></div>
            <div id="blog" class="tab-content"></div>
            <div id="updates" class="tab-content"></div>
            <div id="inbox" class="tab-content"></div>
            <div id="goalies" class="tab-content"></div>
            <div id="resume" class="tab-content"></div>
            <div id="book-club" class="tab-content"></div>
            <div id="vault" class="tab-content"></div>
            <div id="content" class="tab-content"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtLNJJoVBqWdKjDxfddEkdBYAWGrnpuhw",
            authDomain: "coach-berry.firebaseapp.com",
            projectId: "coach-berry",
            storageBucket: "coach-berry.firebasestorage.app",
            messagingSenderId: "170282824286",
            appId: "1:170282824286:web:5387ec9826c38466c07acf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        window.handleLogin = async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing In...';
            errorDiv.classList.remove('show');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorDiv.textContent = 'Incorrect email or password. Please try again.';
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        };

        window.handleLogout = async function() {
            try {
                await signOut(auth);
            } catch (error) {
                alert('Error logging out: ' + error.message);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const adminDoc = await getDoc(doc(db, 'admins', user.email));
                    if (adminDoc.exists()) {
                        currentUser = user;
                        document.getElementById('loginPage').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        switchTab('overview');
                        loadNotificationCount();
                    } else {
                        await signOut(auth);
                        document.getElementById('loginError').textContent = 'Access denied. You do not have admin privileges.';
                        document.getElementById('loginError').style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error checking admin status:', error);
                    await signOut(auth);
                    document.getElementById('loginError').textContent = 'Error verifying admin status. Please try again.';
                    document.getElementById('loginError').style.display = 'block';
                }
            } else {
                currentUser = null;
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('loginError').style.display = 'none';
            }
        });

        window.getCurrentUser = () => currentUser;
        window.getFirebaseConfig = () => firebaseConfig;

        // Load notification count
        async function loadNotificationCount() {
            try {
                const { collection, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js');
                const snap = await getDocs(query(collection(db, 'notifications'), where('read', '==', false)));
                const count = snap.size;
                const badge = document.getElementById('notifBadge');
                if (badge) {
                    if (count > 0) { badge.textContent = count; badge.style.display = 'inline-flex'; }
                    else badge.style.display = 'none';
                }
            } catch(e) { console.error('Notification count error:', e); }
        }

        window.switchTab = async function(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            const tabElement = document.getElementById(tabName);
            tabElement.classList.add('active');

            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

            const titles = {
                overview: 'Overview',
                members: 'Members',
                blog: 'Blog Posts',
                updates: 'Updates',
                inbox: 'Inbox',
                goalies: 'Goalies',
                resume: 'Coaching Resume',
                'book-club': 'Book Club',
                vault: 'The Vault',
                content: 'Edit Website',
                notifications: 'Notifications'
            };
            document.getElementById('pageTitle').textContent = titles[tabName] || 'Admin Dashboard';

            // Load tab content if not already loaded
            if (tabElement.innerHTML.trim() === '') {
                await loadTabContent(tabName);
            }
        };

        async function loadTabContent(tabName) {
            const tabElement = document.getElementById(tabName);
            tabElement.innerHTML = '<div class="loading-spinner">Loading...</div>';

            try {
                const response = await fetch(`${tabName}.html`);
                if (!response.ok) throw new Error(`Failed to load ${tabName}`);
                const html = await response.text();
                tabElement.innerHTML = html;

                // Run any scripts in the loaded content
                const scripts = tabElement.querySelectorAll('script');
                for (const script of scripts) {
                    const newScript = document.createElement('script');
                    newScript.type = script.type || 'text/javascript';
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    tabElement.appendChild(newScript);
                }

                // Call tab-specific init function after scripts load
                setTimeout(() => {
                    if (tabName === 'members' && window.loadMembers) {
                        window.loadMembers();
                    } else if (tabName === 'overview' && window.loadOverviewStats) {
                        window.loadOverviewStats();
                    } else if (tabName === 'blog' && window.loadBlogPosts) {
                        window.loadBlogPosts();
                    } else if (tabName === 'updates' && window.loadUpdates) {
                        window.loadUpdates();
                    } else if (tabName === 'inbox' && window.loadInbox) {
                        window.loadInbox();
                    } else if (tabName === 'goalies' && window.loadGoaliesAdmin) {
                        window.loadGoaliesAdmin();
                    } else if (tabName === 'book-club' && window.loadBookClub) {
                        window.loadBookClub();
                    } else if (tabName === 'vault' && window.loadVaultAdmin) {
                        window.loadVaultAdmin();
                    }
                }, 100);
            } catch (error) {
                console.error(`Error loading ${tabName}:`, error);
                tabElement.innerHTML = `<div style="padding: 2rem; text-align: center; color: #f44336;">Error loading content. Please refresh the page.</div>`;
            }
        }
    </script>
</body>
</html>
