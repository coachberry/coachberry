<style>
    .inbox-container {
        padding: 2rem;
    }

    .inbox-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .stat-card {
        background: var(--white);
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        text-align: center;
    }

    .stat-number {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--accent);
        margin-bottom: 0.5rem;
    }

    .stat-label {
        color: var(--text-light);
        font-size: 0.9rem;
    }

    .messages-section {
        background: var(--white);
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .messages-header {
        padding: 1.5rem;
        background: var(--primary);
        color: var(--white);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .messages-header h3 {
        margin: 0;
        font-size: 1.2rem;
    }

    .filter-buttons {
        display: flex;
        gap: 0.5rem;
    }

    .filter-btn {
        background: rgba(255,255,255,0.2);
        color: var(--white);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .filter-btn.active {
        background: var(--accent);
    }

    .filter-btn:hover {
        background: var(--accent);
    }

    .messages-list {
        max-height: 800px;
        overflow-y: auto;
    }

    .message-item {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .message-item:hover {
        background: #f9f9f9;
    }

    .message-item.unread {
        background: #f0f8ff;
        font-weight: 600;
    }

    .message-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 0.5rem;
    }

    .message-from {
        font-weight: 600;
        color: var(--primary-dark);
    }

    .message-date {
        color: var(--text-light);
        font-size: 0.9rem;
    }

    .message-subject {
        color: var(--text);
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .message-preview {
        color: var(--text-light);
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
        line-height: 1.4;
    }

    .message-meta {
        display: flex;
        gap: 1rem;
        font-size: 0.85rem;
        color: var(--text-light);
    }

    /* Message Detail Modal */
    .message-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .message-modal.active {
        display: flex;
    }

    .message-modal-content {
        background: var(--white);
        border-radius: 12px;
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        position: relative;
    }

    .message-modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--text-light);
    }

    .message-modal-close:hover {
        color: var(--text);
    }

    .message-detail {
        margin-bottom: 1.5rem;
    }

    .message-detail-label {
        font-weight: 600;
        color: var(--text-light);
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
    }

    .message-detail-value {
        color: var(--text);
        font-size: 1rem;
    }

    .message-content {
        background: #f9f9f9;
        padding: 1.5rem;
        border-radius: 6px;
        margin: 1.5rem 0;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .empty-state {
        padding: 3rem 2rem;
        text-align: center;
        color: var(--text-light);
    }

    .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .empty-state-text {
        font-size: 1.1rem;
    }
</style>

<div class="inbox-container">
    <div class="inbox-stats">
        <div class="stat-card">
            <div class="stat-number" id="totalMessages">0</div>
            <div class="stat-label">Total Messages</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="unreadMessages">0</div>
            <div class="stat-label">Unread Messages</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="uniqueMembers">0</div>
            <div class="stat-label">Members</div>
        </div>
    </div>

    <!-- Broadcast Message Section -->
    <div class="messages-section" style="margin-bottom: 2rem;">
        <div class="messages-header">
            <h3>📬 Send Message to Members</h3>
        </div>
        <div style="padding: 2rem;">
            <div class="message" id="broadcastMessage"></div>
            <form id="broadcastForm" onsubmit="handleBroadcastMessage(event)">
                <div class="form-group">
                    <label for="broadcastSubject">Subject</label>
                    <input type="text" id="broadcastSubject" placeholder="e.g., Practice Update" required style="width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1rem; box-sizing: border-box;">
                </div>

                <div class="form-group">
                    <label for="broadcastContent">Message</label>
                    <textarea id="broadcastContent" placeholder="Type your message..." rows="8" required style="width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1rem; resize: vertical; box-sizing: border-box;"></textarea>
                </div>

                <div class="form-group">
                    <label>Select Members to Receive Message</label>
                    <div style="background: var(--light-gray); padding: 1rem; border-radius: 6px; max-height: 300px; overflow-y: auto; border: 2px solid var(--border);">
                        <div id="membersList" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button type="submit" class="save-btn">Send Message</button>
                    <button type="button" onclick="selectAllMembers()" class="save-btn" style="background: var(--accent); margin: 0;">Select All</button>
                    <button type="button" onclick="clearAllMembers()" class="save-btn" style="background: var(--secondary); margin: 0;">Clear All</button>
                </div>
            </form>
        </div>
    </div>

    <div class="messages-section">
        <div class="messages-header">
            <h3>📧 Messages</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterMessages('all')">All</button>
                <button class="filter-btn" onclick="filterMessages('unread')">Unread</button>
            </div>
        </div>
        <div class="messages-list" id="messagesList"></div>
    </div>

    <!-- Broadcast Messages History Section -->
    <div class="messages-section" style="margin-top: 2rem;">
        <div class="messages-header">
            <h3>📢 Broadcast Message History</h3>
        </div>
        <div class="messages-list" id="broadcastMessagesList"></div>
    </div>

    <!-- Archived Messages Section -->
    <div class="messages-section" style="margin-top: 2rem;">
        <div class="messages-header">
            <h3>📁 Archived Messages</h3>
        </div>
        <div class="messages-list" id="archivedMessagesList"></div>
    </div>
</div>

<!-- Message Detail Modal -->
<div class="message-modal" id="messageModal">
    <div class="message-modal-content">
        <button class="message-modal-close" onclick="closeMessageModal()">&times;</button>
        <div style="overflow-y: auto; flex: 1; padding: 2rem;">
            <div class="message-detail">
                <div class="message-detail-label">From</div>
                <div class="message-detail-value" id="modalFrom"></div>
            </div>
            <div class="message-detail">
                <div class="message-detail-label">Email</div>
                <div class="message-detail-value" id="modalEmail"></div>
            </div>
            <div class="message-detail">
                <div class="message-detail-label">Date</div>
                <div class="message-detail-value" id="modalDate"></div>
            </div>
            <div class="message-detail">
                <div class="message-detail-label">Subject</div>
                <div class="message-detail-value" id="modalSubject"></div>
            </div>
            <div class="message-detail">
                <div class="message-detail-label">Message</div>
                <div class="message-content" id="modalContent"></div>
            </div>

            <!-- Replies Section -->
            <div id="repliesSection" style="margin: 2rem 0; padding: 2rem 0; border-top: 1px solid var(--border); display: none;">
                <div class="message-detail-label">Your Replies</div>
                <div id="modalReplies" style="margin: 1rem 0;"></div>
            </div>

            <!-- Reply Form -->
            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <div class="message-detail-label">Send Reply</div>
                <div style="margin-top: 1rem;">
                    <textarea id="replyContent" placeholder="Type your reply..." rows="4" style="width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1rem; resize: vertical; box-sizing: border-box;"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;">
                    <button onclick="sendReply()" style="background: var(--accent); color: white; border: none; padding: 0.8rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer;">Send Reply</button>
                    <button id="archiveBtn" onclick="archiveMessage()" style="background: #FFC107; color: #000; border: none; padding: 0.8rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer;">📁 Archive</button>
                    <button id="unarchiveBtn" onclick="unarchiveMessage()" style="background: #FFC107; color: #000; border: none; padding: 0.8rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer; display: none;">↩️ Unarchive</button>
                    <button onclick="deleteMessage()" style="background: #dc3545; color: white; border: none; padding: 0.8rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer;">🗑️ Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, onSnapshot, getDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const config = window.getFirebaseConfig();
    
    // Check if an app with this name already exists
    const existingApps = getApps();
    let app = existingApps.find(a => a.name === 'admin-inbox');
    
    if (!app) {
        app = initializeApp(config, { name: 'admin-inbox' });
    }
    
    const db = getFirestore(app);

    let allMessages = [];
    let filteredMessages = [];
    let currentFilter = 'all';

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'N/A';
        const date = new Date(timestamp.seconds * 1000);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        } else if (diffDays === 1) {
            return 'Yesterday';
        } else if (diffDays < 7) {
            return `${diffDays} days ago`;
        } else {
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }
    }

    async function loadInbox() {
        try {
            const messagesQuery = query(collection(db, 'messages'), orderBy('dateSent', 'desc'));
            const snapshot = await getDocs(messagesQuery);
            allMessages = [];
            archivedMessages = [];

            snapshot.forEach(doc => {
                const msg = doc.data();
                if (msg.archived) {
                    archivedMessages.push({ id: doc.id, ...msg });
                } else if (!msg.deleted) {
                    // Filter out deleted messages, but keep active ones
                    allMessages.push({ id: doc.id, ...msg });
                }
            });

            // Update unread count badge
            const unreadCount = allMessages.filter(msg => !msg.read || msg.hasUnreadReplies).length;
            const unreadBadge = document.getElementById('adminInboxUnreadBadge');
            if (unreadCount > 0) {
                unreadBadge.textContent = unreadCount;
                unreadBadge.style.display = 'inline-flex';
            } else {
                unreadBadge.style.display = 'none';
            }

            updateStats();
            displayMessages();
            displayArchivedMessages(archivedMessages);
        } catch (error) {
            console.error('Error loading messages:', error);
            document.getElementById('messagesList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Error loading messages</div></div>';
        }
    }

    function displayArchivedMessages(archivedMessages) {
        const archivedList = document.getElementById('archivedMessagesList');

        if (archivedMessages.length === 0) {
            archivedList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No archived messages</div></div>';
            return;
        }

        archivedList.innerHTML = '';
        archivedMessages.forEach(message => {
            const preview = message.initialMessage.substring(0, 100) + (message.initialMessage.length > 100 ? '...' : '');
            const messageItem = document.createElement('div');
            messageItem.className = 'message-item';
            messageItem.style.opacity = '0.7';
            messageItem.style.cursor = 'pointer';
            messageItem.onclick = () => openMessage(message.id, true);
            messageItem.innerHTML = `
                <div class="message-header">
                    <div>
                        <div class="message-from">${escapeHtml(message.fromName || message.from || 'Unknown')}</div>
                        <div class="message-subject">${escapeHtml(message.subject || 'No Subject')}</div>
                        <div class="message-preview">${escapeHtml(preview)}</div>
                    </div>
                </div>
                <div class="message-meta">
                    <span>${formatDate(message.dateSent)}</span>
                </div>
            `;
            archivedList.appendChild(messageItem);
        });
    }

    // Export loadInbox to window immediately
    window._loadInboxOriginal = loadInbox;

    function updateStats() {
        const totalMessages = allMessages.length;
        const unreadMessages = allMessages.filter(m => !m.read).length;
        const uniqueMembers = new Set(allMessages.map(m => m.from)).size;

        document.getElementById('totalMessages').textContent = totalMessages;
        document.getElementById('unreadMessages').textContent = unreadMessages;
        document.getElementById('uniqueMembers').textContent = uniqueMembers;
    }

    function displayMessages() {
        const messagesList = document.getElementById('messagesList');

        if (allMessages.length === 0) {
            messagesList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No messages yet</div></div>';
            return;
        }

        filteredMessages = currentFilter === 'unread' 
            ? allMessages.filter(m => !m.read)
            : allMessages;

        if (filteredMessages.length === 0) {
            messagesList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-text">No unread messages</div></div>';
            return;
        }

        messagesList.innerHTML = filteredMessages.map(message => {
            const preview = message.initialMessage.substring(0, 100) + (message.initialMessage.length > 100 ? '...' : '');
            const isUnread = !message.read || message.hasUnreadReplies;
            return `
                <div class="message-item ${isUnread ? 'unread' : ''}" onclick="openMessage('${message.id}')">
                    <div class="message-header">
                        <div>
                            <div class="message-from">${escapeHtml(message.fromName || message.from || 'Unknown')}</div>
                            <div class="message-subject">${escapeHtml(message.subject || 'No Subject')}</div>
                            <div class="message-preview">${escapeHtml(preview)}</div>
                        </div>
                    </div>
                    <div class="message-meta">
                        <span>${formatDate(message.dateSent)}</span>
                        ${isUnread ? '<span style="color: var(--accent); font-weight: 600;">●</span>' : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function loadBroadcastMessages() {
        try {
            const broadcastQuery = query(collection(db, 'broadcastMessages'), orderBy('sentAt', 'desc'));
            const snapshot = await getDocs(broadcastQuery);
            const broadcastList = document.getElementById('broadcastMessagesList');
            const messages = [];

            snapshot.forEach(doc => {
                messages.push({ id: doc.id, ...doc.data() });
            });

            if (messages.length === 0) {
                broadcastList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No broadcast messages sent yet</div></div>';
                return;
            }

            broadcastList.innerHTML = messages.map(msg => {
                const preview = msg.content.substring(0, 100) + (msg.content.length > 100 ? '...' : '');
                return `
                    <div class="message-item">
                        <div class="message-header">
                            <div>
                                <div class="message-from">Broadcast to: ${escapeHtml(msg.recipientName)}</div>
                                <div class="message-subject">${escapeHtml(msg.subject || 'No Subject')}</div>
                                <div class="message-preview">${escapeHtml(preview)}</div>
                                <div style="font-size: 0.85rem; color: var(--text-light); margin-top: 0.25rem;">${escapeHtml(msg.recipientEmail)}</div>
                            </div>
                        </div>
                        <div class="message-meta">
                            <span>${formatDate(msg.sentAt)}</span>
                            ${msg.read ? '<span style="color: var(--text-light);">✓ Read</span>' : '<span style="color: var(--accent); font-weight: 600;">● Unread</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error('Error loading broadcast messages:', error);
        }
    }

    window.filterMessages = function(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        displayMessages();
    };
    window._filterMessagesImpl = window.filterMessages;

    let currentMessageId = null;
    let currentMessageIsArchived = false;
    let currentMessageIsBroadcast = false;
    let archivedMessages = [];

    window.openMessage = async function(messageId, isArchived = false) {
        let message;
        if (isArchived) {
            message = archivedMessages.find(m => m.id === messageId);
        } else {
            message = allMessages.find(m => m.id === messageId);
        }
        
        if (!message) return;

        currentMessageId = messageId;
        currentMessageIsArchived = isArchived;
        currentMessageIsBroadcast = message.isBroadcast || false;

        document.getElementById('modalFrom').textContent = escapeHtml(message.fromName || message.from || 'Unknown');
        document.getElementById('modalEmail').textContent = escapeHtml(message.email || message.from || 'N/A');
        document.getElementById('modalSubject').textContent = escapeHtml(message.subject || 'No Subject');
        document.getElementById('modalDate').textContent = formatDate(message.dateSent);
        document.getElementById('modalContent').textContent = message.initialMessage || message.content || '';
        document.getElementById('replyContent').value = '';

        // Display replies if any
        const replies = message.replies || [];
        const repliesSection = document.getElementById('repliesSection');
        const modalReplies = document.getElementById('modalReplies');

        if (replies.length > 0) {
            repliesSection.style.display = 'block';
            modalReplies.innerHTML = replies.map(reply => {
                const isFromCoach = reply.from === 'coach';
                return `
                    <div style="background: ${isFromCoach ? '#f0f8ff' : '#f9f9f9'}; padding: 1rem; border-radius: 6px; margin-bottom: 0.5rem; border-left: 3px solid ${isFromCoach ? 'var(--accent)' : '#ddd'};">
                        <div style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: 600;">${isFromCoach ? '🏒 Coach' : message.fromName || 'Member'} • ${formatDate(reply.dateSent)}</div>
                        <p style="margin: 0; white-space: pre-wrap; color: var(--text);">${escapeHtml(reply.content)}</p>
                    </div>
                `;
            }).join('');
        } else {
            repliesSection.style.display = 'none';
        }

        // Show/hide buttons based on message location and type
        const replyBtn = document.querySelector('button[onclick="sendReply()"]');
        const archiveBtn = document.getElementById('archiveBtn');
        const unarchiveBtn = document.getElementById('unarchiveBtn');
        const deleteBtn = document.querySelector('button[onclick="deleteMessage()"]');
        
        // All messages in archive can be unarchived and deleted
        if (isArchived) {
            if (replyBtn) replyBtn.style.display = 'block';
            archiveBtn.style.display = 'none';
            unarchiveBtn.style.display = 'block';
            if (deleteBtn) deleteBtn.style.display = 'block';
        } 
        // Broadcast messages can be archived and deleted, but not replied to
        else if (currentMessageIsBroadcast) {
            if (replyBtn) replyBtn.style.display = 'none';
            archiveBtn.style.display = 'block';
            unarchiveBtn.style.display = 'none';
            if (deleteBtn) deleteBtn.style.display = 'block';
        }
        // Regular messages can be replied to, archived, and deleted
        else {
            if (replyBtn) replyBtn.style.display = 'block';
            archiveBtn.style.display = 'block';
            unarchiveBtn.style.display = 'none';
            if (deleteBtn) deleteBtn.style.display = 'block';
        }

        // Mark message as read if not archived and not broadcast
        if (!isArchived && !currentMessageIsBroadcast) {
            try {
                await updateDoc(doc(db, 'messages', messageId), { read: true });
            } catch (error) {
                console.error('Error marking message as read:', error);
            }
        }

        document.getElementById('messageModal').classList.add('active');
    };
    window._openMessageImpl = window.openMessage;

    window.deleteMessage = async function() {
        if (!currentMessageId) return;
        if (!confirm('Are you sure you want to delete this message? This cannot be undone.')) {
            return;
        }

        try {
            await updateDoc(doc(db, 'messages', currentMessageId), { deleted: true });
            document.getElementById('messageModal').classList.remove('active');
            await loadInbox();
            alert('Message deleted');
        } catch (error) {
            console.error('Error deleting message:', error);
            alert('Error deleting message: ' + error.message);
        }
    };
    window._deleteMessageImpl = window.deleteMessage;

    window.archiveMessage = async function() {
        if (!currentMessageId) return;

        try {
            await updateDoc(doc(db, 'messages', currentMessageId), { archived: true });
            document.getElementById('messageModal').classList.remove('active');
            await loadInbox();
            alert('Message archived');
        } catch (error) {
            console.error('Error archiving message:', error);
            alert('Error archiving message: ' + error.message);
        }
    };
    window._archiveMessageImpl = window.archiveMessage;

    window.unarchiveMessage = async function() {
        if (!currentMessageId) return;

        try {
            await updateDoc(doc(db, 'messages', currentMessageId), { archived: false });
            document.getElementById('messageModal').classList.remove('active');
            await loadInbox();
            alert('Message moved back to Messages');
        } catch (error) {
            console.error('Error unarchiving message:', error);
            alert('Error unarchiving message: ' + error.message);
        }
    };
    window._unarchiveMessageImpl = window.unarchiveMessage;

    window.sendReply = async function() {
        if (!currentMessageId) return;
        
        if (currentMessageIsBroadcast) {
            alert('Cannot reply to broadcast messages');
            return;
        }

        const replyContent = document.getElementById('replyContent').value.trim();
        if (!replyContent) {
            alert('Please type a reply');
            return;
        }

        try {
            const messageRef = doc(db, 'messages', currentMessageId);
            const messageDoc = await getDoc(messageRef);

            if (!messageDoc.exists()) {
                alert('Message not found');
                return;
            }

            const replies = messageDoc.data().replies || [];
            replies.push({
                from: 'coach',
                content: replyContent,
                dateSent: new Date()
            });

            // If message was archived, unarchive it when replying
            const updateData = { replies, hasUnreadReplies: false };
            if (currentMessageIsArchived) {
                updateData.archived = false;
            }

            await updateDoc(messageRef, updateData);

            alert('Reply sent!');
            document.getElementById('replyContent').value = '';

            // Reload the message to show the new reply
            loadInbox().then(() => {
                openMessage(currentMessageId, false);
            });
        } catch (error) {
            console.error('Error sending reply:', error);
            alert('Error sending reply: ' + error.message);
        }
    };
    window._sendReplyImpl = window.sendReply;

    window.closeMessageModal = function() {
        document.getElementById('messageModal').classList.remove('active');
    };
    window._closeMessageModalImpl = window.closeMessageModal;

    // Close modal when clicking outside
    document.getElementById('messageModal').addEventListener('click', function(event) {
        if (event.target === this) {
            closeMessageModal();
        }
    });

    // Broadcast message functionality
    let allMembers = [];

    async function loadAllMembers() {
        try {
            const q = query(collection(db, 'members'));
            const snapshot = await getDocs(q);
            allMembers = [];
            const membersList = document.getElementById('membersList');
            membersList.innerHTML = '';

            snapshot.forEach(doc => {
                const member = doc.data();
                allMembers.push({
                    id: doc.id,
                    email: member.email,
                    name: `${member.firstName} ${member.lastName}`
                });

                const checkbox = document.createElement('label');
                checkbox.style.cssText = 'display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.5rem; border-radius: 4px; transition: background 0.2s;';
                checkbox.innerHTML = `
                    <input type="checkbox" class="memberCheckbox" value="${member.email}" data-name="${member.firstName} ${member.lastName}" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>${escapeHtml(member.firstName)} ${escapeHtml(member.lastName)} (${escapeHtml(member.email)})</span>
                `;
                checkbox.onmouseover = () => checkbox.style.background = '#e8e8e8';
                checkbox.onmouseout = () => checkbox.style.background = 'transparent';
                membersList.appendChild(checkbox);
            });
        } catch (error) {
            console.error('Error loading members:', error);
        }
    }

    window.selectAllMembers = function() {
        document.querySelectorAll('.memberCheckbox').forEach(cb => cb.checked = true);
    };

    window.clearAllMembers = function() {
        document.querySelectorAll('.memberCheckbox').forEach(cb => cb.checked = false);
    };

    window.handleBroadcastMessage = async function(event) {
        event.preventDefault();

        const subject = document.getElementById('broadcastSubject').value.trim();
        const content = document.getElementById('broadcastContent').value.trim();
        const msgDiv = document.getElementById('broadcastMessage');
        const btn = event.target.querySelector('.save-btn');

        if (!subject || !content) {
            msgDiv.textContent = 'Please fill in subject and message';
            msgDiv.classList.add('show', 'error');
            return;
        }

        // Get selected members
        const selectedEmails = Array.from(document.querySelectorAll('.memberCheckbox:checked'))
            .map(cb => ({
                email: cb.value,
                name: cb.dataset.name
            }));

        if (selectedEmails.length === 0) {
            msgDiv.textContent = 'Please select at least one member';
            msgDiv.classList.add('show', 'error');
            return;
        }

        btn.disabled = true;
        msgDiv.classList.remove('show');

        try {
            // Call Cloud Function to send emails and create messages
            const response = await fetch('https://us-central1-coach-berry.cloudfunctions.net/sendBroadcastMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subject: subject,
                    content: content,
                    recipients: selectedEmails
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            msgDiv.textContent = '✓ Message sent to ' + selectedEmails.length + ' member(s)!';
            msgDiv.classList.add('show', 'success');
            event.target.reset();

            setTimeout(() => msgDiv.classList.remove('show'), 4000);
        } catch (error) {
            msgDiv.textContent = 'Error sending message: ' + error.message;
            msgDiv.classList.add('show', 'error');
        } finally {
            btn.disabled = false;
        }
    };

    // Load members when inbox tab loads
    window.loadInbox = async function() {
        await loadAllMembers();
        await loadBroadcastMessages();
        return await window._loadInboxOriginal();
    };
</script>
